name: C++ Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout your repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ Install g++ compiler
    - name: Install g++
      run: sudo apt update && sudo apt install -y g++

    # 3️⃣ Compile your C++ files
    - name: Compile project
      run: g++ src/main.cpp src/BillingSystem.cpp -o billing

    # 4️⃣ Optional: Run the program (won’t work interactively)
    # - name: Run program
    #   run: ./billing
